services:
  app:
    build: .
    ports:
      - "3333:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  # Development mode: separate frontend + backend with hot reload
  backend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3001:3001"
    command: npm run dev
    profiles:
      - dev

  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
